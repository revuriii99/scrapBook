<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Scrapbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stage">

    <!-- COVER: 1 panel utuh, hinge di kiri (spine), dibuka pakai swipe -->
    <div class="cover" id="cover">
      <h1 class="cover-title">Our Little<br>Scrapbook</h1>
    </div>

    <!-- BOOK -->
    <div class="book" id="book">

  <div class="page-base page-left"></div>
  <div class="page-base page-right"></div>

  <div class="sheet">
    <div class="face front">
      <div class="page-content">
        <div class="polaroid" style="--rot:-4deg;">
          <img class="polaroid-photo" src="assets/images/foto1.jpeg">
          <p class="polaroid-caption">us :), KITA LUCU BANGET</p>
          <span class="washi-tape top-left"></span>
        </div>
      </div>
    </div>
    <div class="face back">
      <div class="page-content">
        <div class="polaroid" style="--rot:3deg;">
          <img class="polaroid-photo" src="assets/images/foto2.jpeg">
          <p class="polaroid-caption">di bunda mariaa, malah pacaran ( ｡ •̀ ᴖ •́ ｡)💢</p>
          <span class="washi-tape top-right"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="sheet">
    <div class="face front">
      <div class="page-content">
        <div class="polaroid" style="--rot:-3deg;">
          <img class="polaroid-photo" src="assets/images/foto3.jpeg">
          <p class="polaroid-caption">ini aku mode npd</p>
          <span class="washi-tape top-left"></span>
        </div>
      </div>
    </div>
    <div class="face back">
      <div class="page-content">
        <div class="polaroid" style="--rot:5deg;">
          <img class="polaroid-photo" src="assets/images/foto4.jpeg">
          <p class="polaroid-caption">FIRST DATE LUCUUU</p>
          <span class="washi-tape top-right"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="sheet">
    <div class="face front">
      <div class="page-content">
        <div class="polaroid" style="--rot:-5deg;">
          <img class="polaroid-photo" src="assets/images/foto5.jpeg">
          <p class="polaroid-caption">INI PAS DI PIK IMUT BINGITS</p>
          <span class="washi-tape top-left"></span>
        </div>
      </div>
    </div>
    <div class="face back">
      <div class="page-content" style="flex-direction:row; gap:10px;">
        <div class="polaroid" style="--rot:-3deg;">
          <img class="polaroid-photo" src="assets/images/foto6.jpeg" style="width:130px;height:130px;">
        </div>
        <div class="polaroid" style="--rot:4deg;">
          <img class="polaroid-photo" src="assets/images/foto7.jpeg" style="width:130px;height:130px;">
        </div>
      </div>
    </div>
  </div>

</div>

  </div>

<script src="script.js"></script>
</body>
</html>
