<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Scrapbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stage">

    <!-- COVER: 1 panel utuh, hinge di kiri (spine), dibuka pakai swipe -->
    <div class="cover" id="cover">
      <h1 class="cover-title">Our Little<br>Scrapbook</h1>
    </div>

    <!-- BOOK -->
    <div class="book" id="book">

      <div class="page-base page-left"></div>
      <div class="page-base page-right"></div>

      <div class="sheet">
        <div class="face front">
          <span class="placeholder-label">Halaman 1</span>
        </div>
        <div class="face back">
          <span class="placeholder-label">Halaman 2</span>
        </div>
      </div>

      <div class="sheet">
        <div class="face front">
          <span class="placeholder-label">Halaman 3</span>
        </div>
        <div class="face back">
          <span class="placeholder-label">Halaman 4</span>
        </div>
      </div>

      <div class="sheet">
        <div class="face front">
          <span class="placeholder-label">Halaman 5</span>
        </div>
        <div class="face back">
          <span class="placeholder-label">Halaman 6 (akhir)</span>
        </div>
      </div>

    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
